<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#7c3aed" />
    <meta name="description" content="PhysioMaster — Clinical Assessment Tool for Physiotherapists" />

    <!-- PWA / App install -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="PhysioMaster" />

    <!-- Preconnect to speed up external resources -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Critical CSS inlined — prevents flash of unstyled content -->
    <style>
      /* Base reset — prevents layout shift */
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      html, body {
        height: 100%;
        font-family: system-ui, -apple-system, BlinkMacSystemFont,
                     'Segoe UI', sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        /* Prevent text size adjustment on mobile rotation */
        -webkit-text-size-adjust: 100%;
      }

      /* Loading screen — shown before React hydrates */
      #root:empty::after {
        content: '';
        position: fixed;
        inset: 0;
        background: #f5f0fb;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
      }

      /* Loading spinner visible before JS loads */
      #app-loader {
        position: fixed;
        inset: 0;
        background: #f5f0fb;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        z-index: 9999;
        transition: opacity 0.3s;
      }
      #app-loader.hidden {
        opacity: 0;
        pointer-events: none;
      }
      .loader-ring {
        width: 40px;
        height: 40px;
        border: 3px solid #ede7f6;
        border-top-color: #7c3aed;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      .loader-text {
        font-size: 0.8rem;
        color: #7e6a9a;
        font-weight: 500;
        letter-spacing: 0.3px;
      }
      @keyframes spin { to { transform: rotate(360deg); } }

      /* Prevent scrollbar layout shift */
      html { scrollbar-gutter: stable; }

      /* Touch optimisations for mobile */
      button, [role="button"] {
        -webkit-tap-highlight-color: transparent;
        touch-action: manipulation;
      }

      /* Smooth scrolling */
      html { scroll-behavior: smooth; }

      /* Input base — prevents zoom on iOS (font-size must be ≥16px) */
      input, select, textarea {
        font-size: 16px; /* prevents iOS zoom on focus */
      }
      @media (min-width: 768px) {
        input, select, textarea { font-size: inherit; }
      }
    </style>

    <title>PhysioMaster — Clinical Assessment</title>
  </head>
  <body>

    <!-- Loading indicator shown before React loads -->
    <div id="app-loader">
      <div class="loader-ring"></div>
      <div class="loader-text">PhysioMaster</div>
    </div>

    <!-- React mounts here -->
    <div id="root"></div>

    <!-- Hide loader once React takes over -->
    <script>
      // Hide loader as soon as React renders anything
      const observer = new MutationObserver(() => {
        const root = document.getElementById('root');
        if (root && root.children.length > 0) {
          const loader = document.getElementById('app-loader');
          if (loader) {
            loader.classList.add('hidden');
            setTimeout(() => loader.remove(), 400);
          }
          observer.disconnect();
        }
      });
      observer.observe(document.getElementById('root'), { childList: true });
    </script>

    <!-- Main app bundle — Vite injects this -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
