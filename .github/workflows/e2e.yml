name: E2E tests

# Runs the real-browser Playwright suite (e2e/patient-journey.spec.ts)
# against a build wired to a disposable TEST Supabase project -- never
# production. See e2e/README.md for the one-time setup this depends on
# (creating that test project + adding E2E_SUPABASE_URL / E2E_SUPABASE_ANON_KEY
# as repo secrets). If those secrets aren't set yet, this job will fail at
# the build step with a clear missing-env-var error rather than silently
# hitting production, since there is no fallback to the hardcoded prod
# credentials once these env vars are wired into the build step below.

on:
  push:
    branches: [dev]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build against the disposable test Supabase project
        env:
          VITE_SUPABASE_URL: ${{ secrets.E2E_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.E2E_SUPABASE_ANON_KEY }}
        run: npm run build

      # src/supabase.js falls back to the real production project
      # (dlauxdokkrqbvbormxte) via `||` whenever VITE_SUPABASE_URL is unset
      # or empty -- which is exactly what happens if E2E_SUPABASE_URL is
      # missing/blank in this repo's Actions secrets. That fallback is
      # silent: `npm run build` above succeeds either way, so nothing
      # upstream catches it. Confirmed locally that a build with no env
      # vars set bakes the literal prod project ref into dist/ with no
      # error. Fail loudly here instead of letting E2E silently run
      # (and potentially write real-looking test data) against production.
      - name: Guard against silently building against production Supabase
        run: |
          if grep -rq "dlauxdokkrqbvbormxte" dist/; then
            echo "::error::Build output references the PRODUCTION Supabase project (dlauxdokkrqbvbormxte). This means VITE_SUPABASE_URL/VITE_SUPABASE_ANON_KEY were empty or unset during build -- check the E2E_SUPABASE_URL / E2E_SUPABASE_ANON_KEY repo secrets (Settings -> Secrets and variables -> Actions). Refusing to run E2E tests against production."
            exit 1
          fi

      - name: Run E2E tests
        run: npx playwright test
        env:
          CI: true

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
