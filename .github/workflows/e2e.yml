name: E2E tests

# Runs the real-browser Playwright suite (e2e/patient-journey.spec.ts)
# against a build wired to a disposable TEST Supabase project -- never
# production. See e2e/README.md for the one-time setup this depends on
# (creating that test project + adding E2E_SUPABASE_URL / E2E_SUPABASE_ANON_KEY
# as repo secrets). If those secrets aren't set yet, this job will fail at
# the build step with a clear missing-env-var error rather than silently
# hitting production, since there is no fallback to the hardcoded prod
# credentials once these env vars are wired into the build step below.

on:
  push:
    branches: [dev]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build against the disposable test Supabase project
        env:
          VITE_SUPABASE_URL: ${{ secrets.E2E_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.E2E_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Run E2E tests
        run: npx playwright test
        env:
          CI: true

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
